<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript 1</title>
</head>
<body>
    <h1>Tugas 1 Javascript</h1>
    <h2>Nama    : Muhamad Hilmi Kamil</h2>
    <hr>
    <h3>Menghitung Persegi Panjang, Bujur Sangkar dan Segitiga</h3>
    <hr>

    <script>
        // Menghitung Luas Persegi Panjang
        // Deklarasi variabel panjang dan lebar Persegi Panjang dengan nilai bebas
        let panjang = 12;
        let lebar = 10;
        // Rumus luas persegi panjang = panjang * lebar
        let luasPersegiPanjang = panjang * lebar;

        // Output Web
        document.write('<b> Luas Persegi Panjang </b><br>' + 'Diketahui : <br>' +
            'Panjang = ' + panjang + '<br>' +
            'Lebar = ' + lebar + '<br>' +
            'Rumus Luas Persegi Panjang = Panjang * Lebar <br>' +
            '<b>' + 'Luas Persegi Panjang = ' + luasPersegiPanjang + ' cm2<br>' + '</b>'
        );

        document.write('<hr>');
        
        // Menghitung Luas Bujur Sangkar
        // Deklarasi variabel sisi Bujur Sangkar dengan nilai bebas
        let sisi = 20;
        // Rumus luas bujur sangkar = sisi * sisi
        let luasBujurSangkar = sisi * sisi;

        // Output Web
        document.write('<b>Luas Bujur Sangkar</b> <br>' + 'Diketahui : <br>' +
            'Sisi = ' + sisi + '<br>' +
            'Rumus Luas Bujur Sangkar = Sisi * Sisi <br>' +
            '<b>' + 'Luas Bujur Sangkar = ' + luasBujurSangkar + ' cm2<br>' + '</b>'
        );

        document.write('<hr>');

        // Menghitung Luas Segitiga
        // Deklarasi variabel alas dan tinggi Segitiga dengan nilai bebas
        let alas = 5;
        let tinggi = 10;
        // Rumus luas segitiga = 1/2 * alas * tinggi
        let luasSegitiga = 0.5 * alas * tinggi; 

        // Output Web
        document.write('<b>Luas Segitiga</b> <br>' + 'Diketahui : <br>' +
            'Alas = ' + alas + '<br>' +
            'Tinggi = ' + tinggi + '<br>' +
            'Rumus Luas Segitiga = 1/2 * Alas * Tinggi <br>' +
            '<b>' + 'Luas Segitiga = ' + luasSegitiga + ' cm2' + '</b>'
        );
    </script>
</body>
</html>
