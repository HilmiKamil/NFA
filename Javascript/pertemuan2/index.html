<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2 - Javascript</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        tfoot {
            font-weight: bold;
            background-color: #e6f7ff;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Tugas 2 - JavaScript</h1>
    <hr>
    <h3>Nama : Muhamad Hilmi Kamil</h3>
    <hr>

    <script>
        // Data pegawai
        let pegawai = "Dodi Prayodi";
        let umur = 25;
        let jabatan = "Manajer";
        let status = "Menikah";
        let salary = 0;

        // Gaji Pokok dengan if
        if (jabatan == "Manajer") {
            salary = 15000000;
        } else if (jabatan == "Asisten Manajer") {
            salary = 10000000;
        } else if (jabatan == "Staff") {
            salary = 5000000;
        } else {
            salary = 0;
        }

        // Tunjangan Jabatan: 15% dari gapok 
        let tunjangan_jabatan = 0.15 * salary;
        // BPJS: 10% dari gapok 
        let BPJS = 0.10 * salary;
        // Tunjangan Keluarga (ternary) 20% jika menikah
        let tunjangan_family = (status == "Menikah") ? 0.20 * salary : 0;
        // Total Gaji: jumlahlahkan seluruh element gaji 
        let total = salary + tunjangan_jabatan + BPJS + tunjangan_family;
    </script>

    <!-- Tabel Data Pegawai -->
    <table>
        <thead>
            <tr>
                <th>Nama Pegawai</th>
                <th>Umur</th>
                <th>Jabatan</th>
                <th>Status</th>
                <th>Gaji Pokok</th>
                <th>Tunjangan Jabatan (15%)</th>
                <th>BPJS (10%)</th>
                <th>Tunjangan Keluarga (20%)</th>
            </tr>
        </thead>
        <tbody id="datapegawai">
            <!-- Isi data-datanya gunakan tbody (Di Javascript) -->
        </tbody>
        <tfoot id="total_gaji">
            <!-- Isi data-datanya gunakan tbody (Di Javascript) -->
        </tfoot>
    </table>

    <script>
        // Mengisi tbody dengan data
        document.getElementById('datapegawai').innerHTML = `
            <tr>
                <td>${pegawai}</td>
                <td>${umur} Tahun</td>
                <td>${jabatan}</td>
                <td>${status}</td>
                <td>Rp ${salary}</td>
                <td>Rp ${tunjangan_jabatan}</td>
                <td>Rp ${BPJS}</td>
                <td>Rp ${tunjangan_family}</td>
            </tr>
        `;

        // Mengisi tfoot dengan total gaji
        document.getElementById('total_gaji').innerHTML = `
            <tr>
                <td colspan="8" style="text-align: right;">Total Gaji:Rp ${total}</td>
            </tr>
        `;
    </script>
</body>
</html>
