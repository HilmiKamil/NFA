<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #3a583a;
      font-family: 'Segoe UI', sans-serif;
    }
    fieldset {
      border: 2px solid #b5d3a8;
      border-radius: 20px;
      padding: 20px;
      background: rgba(210, 235, 190, 0.2);
      box-shadow: 0 0 15px rgba(100, 130, 80, 0.5);
    }
    legend {
      background: #b5d3a8;
      color: #1f3b1f;
      padding: 5px 20px;
      border-radius: 30px;
      font-weight: bold;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 12px 0;
    }
    a {
      display: block;
      padding: 8px 15px;
      background: #527a52;
      color: #ecf7dc;
      text-decoration: none;
      border-radius: 30px;
      border-left: 5px solid #aac7a0;
      transition: 0.3s;
    }
    a:hover {
      background: #6f9a6f;
      border-left-color: #d7e8c7;
      transform: translateX(5px);
    }
  </style>
