<html>
<head>
  <style>
    body {
      margin: 0;
      background: linear-gradient(145deg, #d8e9d0, #c0ddb8);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h2 {
      text-align: center;
      color: #2b4f2b;
      margin-bottom: 30px;
      font-size: 2.5rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0 #b8d9aa;
      border-bottom: 2px dashed #6c966c;
      padding-bottom: 10px;
      display: inline-block;
    }

    table {
      width: 90%;
      max-width: 900px;
      border-collapse: separate;
      border-spacing: 0;
      background: #fafff7;
      box-shadow: 0 15px 25px -8px rgba(40, 70, 40, 0.3);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid #a8c9a0;
    }

    th {
      background: #4d774d;
      background: linear-gradient(135deg, #4d774d, #396339);
      color: #f4ffee;
      font-size: 1.2rem;
      font-weight: 500;
      padding: 16px 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 3px solid #c7e6b5;
    }

    td {
      padding: 14px 10px;
      border-bottom: 1px solid #cfe1c5;
      color: #1e3a1e;
      font-size: 1.05rem;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:nth-child(even) {
      background-color: #ecfae6;
    }

    tr:hover {
      background-color: #d2efc2;
      transition: background-color 0.2s ease;
    }


  </style>
</head>
<body>
  <h2>Riwayat Pendidikan</h2>
  <table>
    <tr>
      <th>No</th>
      <th>Jenjang</th>
      <th>Nama Sekolah</th>
      <th>Tahun</th>
    </tr>
    <tr>
      <td>1</td>
      <td>SMP</td>
      <td>SMP Negeri 12 Depok</td>
      <td>2017–2020</td>
    </tr>
    <tr>
      <td>2</td>
      <td>SMK</td>
      <td>SMK Generasi Madani</td>
      <td>2020–2023</td>
    </tr>
    <tr>
      <td>3</td>
      <td>Kuliah</td>
      <td>STT Terpadu Nurul Fikri</td>
      <td>2023–sekarang</td>
    </tr>
  </table>
</body>
</html>
