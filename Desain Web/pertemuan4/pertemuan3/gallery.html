<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #2b4f2b, #4f7a4f);
      font-family: 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    h2 {
      color: #ecfad8;
      font-size: 3rem;
      font-weight: 500;
      text-shadow: 4px 4px 0 #2a5a2a, 0 0 20px rgba(180, 220, 140, 0.7);
      margin-bottom: 40px;
      letter-spacing: 2px;
      border-bottom: 3px solid #b1d89b;
      padding-bottom: 15px;
      display: inline-block;
    }

    .gallery {
      max-width: 1300px;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
      padding: 10px;
    }

    .gallery-item {
      overflow: hidden;
      border-radius: 35px;
      box-shadow: 0 20px 30px -8px #1f401f, 0 0 0 2px #c4e3b0 inset;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(2px);
    }

    .gallery-item:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 30px 40px -10px #0f2a0f, 0 0 0 4px #e3ffc7 inset;
    }

    .gallery-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.1);
    }

    @media (max-width: 600px) {
      h2 {
        font-size: 2.5rem;
      }
      .gallery {
        gap: 15px;
      }
      .gallery-item img {
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <h2>Gallery</h2>
  <div class="gallery">
    <div class="gallery-item"><img src="picture1.jpg" alt="Pemandangan hutan 1"></div>
    <div class="gallery-item"><img src="picture2.jfif" alt="Pemandangan hutan 2"></div>
    <div class="gallery-item"><img src="picture3.jfif" alt="Pemandangan hutan 3"></div>
    <div class="gallery-item"><img src="picture4.jpg" alt="Pemandangan hutan 4"></div>
    <div class="gallery-item"><img src="picture5.jpg" alt="Pemandangan hutan 5"></div>
    <div class="gallery-item"><img src="picture6.jpg" alt="Pemandangan hutan 6"></div>
  </div>
</body>
</html>
