<html>
<head>
<style>
body {
    margin: 0;
    padding: 50px 20px;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #d9e0ed, #948787);
    color: #181415;
    text-align: center;
}

h2 {
    font-size: 32px;
    margin-bottom: 30px;
    letter-spacing: 1px;
}

.gallery-marquee {
    width: 90%;
    margin: auto;
}

marquee {
    font-weight: bold;
    font-size: 18px;
    color: #362e2e;
}

img {
    width: 260px;
    height: 180px;
    object-fit: cover;
    margin: 0 15px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    transition: transform 0.4s ease;
}

img:hover {
    transform: scale(1.08);
}
</style>
</head>

<body>

<h2>Gallery</h2>

<marquee class="gallery-marquee" behavior="scroll" direction="left" scrollamount="6">
    <img src="picture1.jpg">
    <img src="picture2.jfif">
    <img src="picture3.jfif">
    <img src="picture4.jpg">
    <img src="picture5.jpg">
    <img src="picture6.jpg">
</marquee>

</body>
</html>
