<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tugas RWD - Hilmi Kamil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
        body {
            background: #eaf3df;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .card {
            border: none;
            border-radius: 1.2rem;
            box-shadow: 0 15px 30px rgba(0, 40, 0, 0.1);
        }
        .card-header {
            background-color: #2b542b;
            color: white;
            text-align: center;
            padding: 1.8rem 1rem;
            border-bottom: none;
            border-top-left-radius: 1.2rem;
            border-top-right-radius: 1.2rem;
        }
        .card-header h3 {
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .card-header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }
        .btn-success {
            background-color: #2b542b;
            border-color: #2b542b;
            padding: 0.6rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-success:hover {
            background-color: #1d3a1d;
            border-color: #1d3a1d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 60, 0, 0.2);
        }
        a {
            color: #2b542b;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            color: #1d3a1d;
            text-decoration: underline;
        }
        .form-check-input:checked {
            background-color: #2b542b;
            border-color: #2b542b;
        }
        .form-control:focus {
            border-color: #2b542b;
            box-shadow: 0 0 0 0.2rem rgba(43, 84, 43, 0.25);
        }
        .brand-icon {
            font-size: 2.2rem;
            margin-bottom: 0.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-10 col-md-8 col-lg-5 col-xl-4">
                <div class="card">
                    <div class="card-header">
                        <div class="brand-icon"><i class="fas fa-key"></i></div>
                        <h3 class="mb-1">Profil - Hilmi</h3>
                        <p class="mb-0">Masuk ke akun Anda</p>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Alamat Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="far fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" placeholder="example@gmail.com" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Kata Sandi</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" placeholder="******" required>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label" for="remember">Ingat saya</label>
                                </div>
                                <a href="#" class="small">Lupa password?</a>
                            </div>
                                <a href="home.html" class="btn btn-success w-100 text-light"><i class="fas fa-sign-in-alt me-2"></i>Login</a>
                        </form>
                        <div class="mt-4 text-center">
                            <span class="text-secondary">Belum punya akun?</span>
                            <a href="#" class="fw-bold">Daftar sekarang</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
